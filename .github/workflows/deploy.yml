name: Deploy to AWS

on:
  push:
    branches: [main]

# Prevent concurrent deploys — queue them instead
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build → Push ECR → CDK Deploy
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── AWS credentials ──────────────────────────────────────────────────────
      # Required GitHub secrets (repo → Settings → Secrets → Actions):
      #   AWS_ACCESS_KEY_ID      — IAM user access key
      #   AWS_SECRET_ACCESS_KEY  — IAM user secret
      #   AWS_REGION             — eu-central-1
      #   AWS_ACCOUNT_ID         — 12-digit account number
      #   ANTHROPIC_API_KEY      — sk-ant-... (synced to SSM before CDK deploy)
      #   ALPHA_ACCESS_KEY       — secret key users type at the /access gate
      #
      # Note: CloudFront is global and its ACM cert must be in us-east-1.
      # Everything else (App Runner, ECR, SSM) runs in eu-central-1.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── Ensure ECR repository exists ─────────────────────────────────────────
      # Created here (not by CDK) so the repo exists before the first image push.
      # Idempotent: silently succeeds if the repo already exists.
      # CDK imports this repo by name rather than creating it.
      - name: Ensure ECR repository exists
        run: |
          aws ecr create-repository \
            --repository-name lifesim \
            --region eu-central-1 \
            --image-scanning-configuration scanOnPush=true \
            2>/dev/null || echo "ECR repository already exists"

          # Keep only the last 10 images (lifecycle policy is idempotent)
          aws ecr put-lifecycle-policy \
            --repository-name lifesim \
            --region eu-central-1 \
            --lifecycle-policy-text '{
              "rules": [{
                "rulePriority": 1,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              }]
            }'

      # ── Login to ECR ─────────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & push Docker image ────────────────────────────────────────────
      - name: Build and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_BASE_PATH=/life-game \
            -t $REGISTRY/lifesim:$IMAGE_TAG \
            -t $REGISTRY/lifesim:latest \
            .
          docker push $REGISTRY/lifesim:$IMAGE_TAG
          docker push $REGISTRY/lifesim:latest

      # ── Sync secrets to SSM Parameter Store ─────────────────────────────────
      # GitHub secrets become SSM SecureString params in eu-central-1.
      # The CDK stack reads these from SSM and injects them into App Runner.
      - name: Sync secrets to SSM
        run: |
          aws ssm put-parameter \
            --region eu-central-1 \
            --name /lifesim/anthropic-api-key \
            --value "${{ secrets.ANTHROPIC_API_KEY }}" \
            --type SecureString \
            --overwrite
          aws ssm put-parameter \
            --region eu-central-1 \
            --name /lifesim/alpha-access-key \
            --value "${{ secrets.ALPHA_ACCESS_KEY }}" \
            --type SecureString \
            --overwrite

      # ── Install CDK dependencies ─────────────────────────────────────────────
      - name: Install infrastructure dependencies
        working-directory: infrastructure
        run: npm ci

      # ── CDK deploy ───────────────────────────────────────────────────────────
      # Passes the git SHA as imageTag so App Runner picks up the new image.
      # CDK reads existingOriginDomain and certificateArn from cdk.json context.
      - name: CDK deploy
        working-directory: infrastructure
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          npx cdk deploy \
            --require-approval never \
            --context imageTag=${{ github.sha }}

      # ── Summary ─────────────────────────────────────────────────────────────
      - name: Deployment summary
        run: |
          echo "✅ Deployed image: ${{ github.sha }}"
          echo "🌐 https://bogdan-vaduva.com/life-game"
